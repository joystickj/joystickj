<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>?joystick</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
/* ===== Minimal Black & White Theme ===== */
:root {
  --bg: #ffffff;
  --fg: #000000;
  --muted: #777;
  --border: #000;
}

html[data-theme="dark"] {
  --bg: #000000;
  --fg: #ffffff;
  --muted: #aaa;
  --border: #fff;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: "IBM Plex Mono", monospace;
  transition: background 0.3s ease, color 0.3s ease;
}

.wrap {
  max-width: 480px;
  margin: auto;
  padding: 24px;
}

/* Nav */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
}

.logo {
  font-weight: 500;
}

/* Buttons */
button {
  background: var(--fg);
  color: var(--bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 16px;
  cursor: pointer;
  transition: all 0.2s ease;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 0 var(--border);
}

button:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 var(--border);
}

/* Hero */
.hero h1 {
  font-size: 28px;
  margin: 0 0 10px;
}

.hero p {
  color: var(--muted);
  margin-bottom: 30px;
}

/* Product cards */
.products {
  display: flex;
  gap: 12px;
}

.product-card {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.product-card:hover {
  transform: translateY(-3px);
}

.product-card.sel {
  background: var(--fg);
  color: var(--bg);
}

/* Labels */
.label {
  margin-top: 24px;
  font-size: 12px;
  color: var(--muted);
}

/* Checkout */
.checkout {
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  margin-top: 10px;
}

.sub {
  color: var(--muted);
  font-size: 13px;
}

/* Inputs */
.field {
  margin-top: 16px;
}

.iw {
  display: flex;
  align-items: center;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px;
  gap: 10px;
}

input {
  background: transparent;
  border: none;
  outline: none;
  color: var(--fg);
  width: 100%;
  font-family: inherit;
}

input::placeholder {
  color: var(--muted);
}

.iw:focus-within {
  box-shadow: 0 0 0 2px var(--border);
}

/* Row */
.row {
  display: flex;
  gap: 10px;
}

.row .field {
  flex: 1;
}

/* Order line */
.order-line {
  display: flex;
  justify-content: space-between;
  margin: 12px 0;
}

/* ===== Pay Button Animation ===== */
#payBtn {
  width: 100%;
  margin-top: 20px;
  position: relative;
  overflow: hidden;
}

/* Ripple */
#payBtn::after {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  background: var(--bg);
  opacity: 0.2;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  left: 50%;
  top: 50%;
  transition: width 0.4s ease, height 0.4s ease;
}

#payBtn:active::after {
  width: 220px;
  height: 220px;
}

/* Loading */
#payBtn.loading {
  opacity: 0.7;
  pointer-events: none;
}

.spin {
  display: none;
}

#payBtn.loading .spin {
  display: inline-block;
  animation: spin 1s linear infinite;
}

#payBtn.loading .bt {
  opacity: 0.5;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--fg);
  color: var(--bg);
  padding: 10px 16px;
  border-radius: 12px;
  display: none;
}
</style>
</head>

<body>
<div id="wipe"></div>

<div class="wrap">
  <nav>
    <div class="logo">
      <i class="fa-solid fa-gamepad"></i>
      ?joystick
    </div>
    <button class="theme-btn" id="themeBtn">
      <i id="themeIcon"></i>
    </button>
  </nav>

  <section class="hero">
    <h1>Pay with your<br>gift card. <em>Play.</em></h1>
    <p>Visa &amp; Mastercard gift cards only</p>
  </section>

  <p class="label">Choose item</p>
  <div class="products">
    <div class="product-card" data-name="Donate" onclick="pick(this)">
      <div class="ck"><i class="fa-solid fa-check"></i></div>
      <div class="cname">Donate</div>
    </div>

    <div class="product-card" data-name="Access" onclick="pick(this)">
      <div class="ck"><i class="fa-solid fa-check"></i></div>
      <div class="cname">Access</div>
    </div>
  </div>

  <p class="label">Payment details</p>
  <div class="checkout">
    <h2>Checkout</h2>
    <p class="sub">Use a Visa or Mastercard prepaid gift card to pay.</p>

    <div class="order-line" id="ol">
      <span class="ol-label">No item selected</span>
      <span class="ol-val">—</span>
    </div>

    <div class="field">
      <label>Cardholder name</label>
      <div class="iw">
        <i class="fa-regular fa-user"></i>
        <input id="fName" type="text" placeholder="Jane Doe" />
      </div>
    </div>

    <button class="btn" id="payBtn" onclick="pay()">
      <i class="fa-solid fa-spinner spin"></i>
      <span class="bt"><i class="fa-solid fa-lock"></i> Pay now</span>
    </button>
  </div>
</div>

</body>
  </html>
